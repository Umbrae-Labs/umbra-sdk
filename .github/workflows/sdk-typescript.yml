name: TypeScript SDK

on:
  push:
    branches: [main, master]
    paths:
      - ".github/workflows/sdk-typescript.yml"
      - "umbra-typescript/**"
  pull_request:
    branches: [main, master]
    paths:
      - ".github/workflows/sdk-typescript.yml"
      - "umbra-typescript/**"

jobs:
  typescript-sdk:
    name: TypeScript SDK
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: umbra-typescript
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: umbra-typescript/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
