name: Go SDK

on:
  push:
    branches: [main, master]
    paths:
      - ".github/workflows/sdk-go.yml"
      - "umbra-go/**"
  pull_request:
    branches: [main, master]
    paths:
      - ".github/workflows/sdk-go.yml"
      - "umbra-go/**"

jobs:
  go-sdk:
    name: Go SDK
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: umbra-go
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: umbra-go/go.mod

      - name: Test
        run: go test ./...
