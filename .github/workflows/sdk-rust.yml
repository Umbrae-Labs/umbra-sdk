name: Rust SDK

on:
  push:
    branches: [main, master]
    paths:
      - ".github/workflows/sdk-rust.yml"
      - "umbra-rust/**"
  pull_request:
    branches: [main, master]
    paths:
      - ".github/workflows/sdk-rust.yml"
      - "umbra-rust/**"

jobs:
  rust-sdk:
    name: Rust SDK
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: umbra-rust
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Test
        run: cargo test --locked
