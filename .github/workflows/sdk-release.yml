name: SDK Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: sdk-release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  version:
    name: Validate version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate tag and package versions
        id: version
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must match vX.Y.Z, got ${tag}" >&2
            exit 1
          fi

          version="${tag#v}"
          ts_version="$(node -p "require('./umbra-typescript/package.json').version")"
          rust_version="$(awk -F ' *= *' '/^version *=/ { gsub(/"/, "", $2); print $2; exit }' umbra-rust/Cargo.toml)"

          if [[ "${ts_version}" != "${version}" ]]; then
            echo "umbra-typescript/package.json version ${ts_version} does not match tag ${version}" >&2
            exit 1
          fi

          if [[ "${rust_version}" != "${version}" ]]; then
            echo "umbra-rust/Cargo.toml version ${rust_version} does not match tag ${version}" >&2
            exit 1
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"

  go:
    name: Go SDK
    runs-on: ubuntu-latest
    needs: version
    timeout-minutes: 15
    defaults:
      run:
        working-directory: umbra-go
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: umbra-go/go.mod
          cache: true
          cache-dependency-path: umbra-go/go.mod

      - name: Test
        run: go test ./...

  typescript:
    name: TypeScript SDK
    runs-on: ubuntu-latest
    needs: version
    timeout-minutes: 20
    defaults:
      run:
        working-directory: umbra-typescript
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          registry-url: https://registry.npmjs.org
          cache: pnpm
          cache-dependency-path: umbra-typescript/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Pack dry run
        run: pnpm pack --dry-run

      - name: Check npm version
        id: npm
        shell: bash
        run: |
          set -euo pipefail

          if npm view "@umbrae-labs/umbra-sdk@${{ needs.version.outputs.version }}" version >/dev/null 2>&1; then
            echo "published=true" >> "${GITHUB_OUTPUT}"
            echo "@umbrae-labs/umbra-sdk@${{ needs.version.outputs.version }} is already published"
          else
            echo "published=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Publish to npm
        if: steps.npm.outputs.published != 'true'
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  rust:
    name: Rust SDK
    runs-on: ubuntu-latest
    needs: version
    timeout-minutes: 30
    defaults:
      run:
        working-directory: umbra-rust
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Test
        run: cargo test --locked

      - name: Publish dry run
        run: cargo publish --locked --dry-run

      - name: Check crates.io version
        id: crates
        shell: bash
        run: |
          set -euo pipefail

          exists="$(python3 - <<'PY'
          import json
          import sys
          import urllib.request

          version = "${{ needs.version.outputs.version }}"
          url = "https://crates.io/api/v1/crates/umbra-sdk/versions"

          try:
              with urllib.request.urlopen(url, timeout=20) as response:
                  payload = json.load(response)
          except Exception:
              print("false")
              sys.exit(0)

          print("true" if any(item.get("num") == version for item in payload.get("versions", [])) else "false")
          PY
          )"

          echo "published=${exists}" >> "${GITHUB_OUTPUT}"
          if [[ "${exists}" == "true" ]]; then
            echo "umbra-sdk ${{ needs.version.outputs.version }} is already published"
          fi

      - name: Publish to crates.io
        if: steps.crates.outputs.published != 'true'
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  tag-go:
    name: Tag Go submodule
    runs-on: ubuntu-latest
    needs: [version, go, typescript, rust]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push Go module tag
        shell: bash
        run: |
          set -euo pipefail

          go_tag="umbra-go/v${{ needs.version.outputs.version }}"
          git fetch --tags --force

          if git rev-parse -q --verify "refs/tags/${go_tag}" >/dev/null; then
            echo "Tag ${go_tag} already exists"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${go_tag}" "${GITHUB_SHA}"
          git push origin "refs/tags/${go_tag}"

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [version, tag-go]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          tag="v${{ needs.version.outputs.version }}"
          if gh release view "${tag}" >/dev/null 2>&1; then
            echo "GitHub release ${tag} already exists"
            exit 0
          fi

          gh release create "${tag}" \
            --title "${tag}" \
            --generate-notes
